<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTGA Draft Tool - Release History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-slate-900 text-slate-300 min-h-screen flex flex-col font-sans">

    <!-- INJECT_NAV -->

    <div class="max-w-4xl mx-auto px-4 md:px-8 py-8 flex-1 w-full">

        <div class="mb-8 pb-6 border-b border-slate-800">
            <h1 class="text-3xl font-bold text-slate-100 mb-2">🚀 Release History</h1>
            <p class="text-slate-400 text-sm">Changelog and previous versions of the MTGA Draft Tool.</p>
        </div>

        <!-- Releases Container -->
        <div id="releases-list" class="space-y-6">
            <div class="p-12 text-center text-slate-500 bg-slate-800/30 rounded-xl border border-slate-700/50">
                <svg class="animate-spin h-8 w-8 mx-auto text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                Loading release history from GitHub...
            </div>
        </div>

    </div>

    <!-- INJECT_FOOTER -->

    <script src="app.js"></script>
</body>

</html>
