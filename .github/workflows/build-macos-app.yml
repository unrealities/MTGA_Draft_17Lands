name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4

      - name: Install Python dependencies
        run: poetry install --no-interaction

      - name: Build executable and App Bundle
        run: poetry run pyinstaller main.spec --clean

      - name: Smoke Test Executable
        run: |
          echo "Launching executable to verify C-extension imports..."
          ./dist/MTGA_Draft_Tool.app/Contents/MacOS/MTGA_Draft_Tool --version

      - name: Package to ZIP and Checksum
        run: |
          cd dist
          zip -r ../MTGA_Draft_Tool_macOS.zip MTGA_Draft_Tool.app
          cd ..
          shasum -a 256 MTGA_Draft_Tool_macOS.zip > MTGA_Draft_Tool_macOS.zip.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MTGA_Draft_Tool_macOS
          path: |
            MTGA_Draft_Tool_macOS.zip
            MTGA_Draft_Tool_macOS.zip.sha256
