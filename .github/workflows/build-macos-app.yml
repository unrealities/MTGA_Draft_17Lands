name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.7.0
          pip install jaraco.text platformdirs importlib-metadata zipp

      - name: Build executable and App Bundle
        run: python -m PyInstaller main.spec --clean

      - name: Package to ZIP
        run: |
          cd dist
          zip -r ../MTGA_Draft_Tool_macOS.zip MTGA_Draft_Tool.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MTGA_Draft_Tool_macOS
          path: MTGA_Draft_Tool_macOS.zip
