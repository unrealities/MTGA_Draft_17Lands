name: Build Linux App

on:
  workflow_dispatch:

jobs:
  build:
    # Use an older Ubuntu to ensure maximum glibc compatibility across distros
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies (Tkinter)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4

      - name: Install Python dependencies
        run: poetry install --no-interaction

      - name: Build executable
        run: poetry run pyinstaller main.spec --clean

      - name: Smoke Test Executable
        run: |
          echo "Launching executable to verify C-extension imports..."
          # We use xvfb-r un to simulate a display server for Tkinter on Linux headless runners
          sudo apt-get install -y xvfb
          xvfb-run -a ./dist/MTGA_Draft_Tool/MTGA_Draft_Tool --version

      - name: Package to Tarball and Checksum
        run: |
          cd dist
          tar -czvf ../MTGA_Draft_Tool_Linux.tar.gz MTGA_Draft_Tool
          cd ..
          sha256sum MTGA_Draft_Tool_Linux.tar.gz > MTGA_Draft_Tool_Linux.tar.gz.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MTGA_Draft_Tool_Linux
          path: |
            MTGA_Draft_Tool_Linux.tar.gz
            MTGA_Draft_Tool_Linux.tar.gz.sha256
